.btn-stamp:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #c4392a;}
.btn-stamp:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #c4392a;}
.btn-ghost{font-family:'Special Elite',monospace;background:transparent;color:#1f1a14;border:2px solid #1f1a14;padding:13px 26px;font-size:14px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}

.perf{background-image:radial-gradient(circle,#ece5d3 3px,transparent 3.5px);background-size:16px 16px;background-position:0 -8px;height:8px;}

const getDemoPrice=(item,price,cur)=>{
  const itemLower=item.toLowerCase().replace(/\s+/g,"");
  const key=Object.keys(DEMO_PRICES).find(k=>itemLower.includes(k));
  const base=DEMO_PRICES[key]||DEMO_PRICES.default;
  if(cur==="INR"&&price&&key&&base.ranges){
    const p=parseFloat(price);
    const r=base.ranges[key];
    if(r)return{...base,verdict:p<r[0]?"DEAL":p<=r[1]?"FAIR":"RIPPED"};
  }
  return base;
};
const getDemoVibe=biz=>{

};
const getDemoPreBuy=(ask,item,cur)=>{
  const p=parseFloat(ask);
  const itemLower=item.toLowerCase().replace(/\s+/g,"");
  const key=Object.keys(DEMO_PRICES).find(k=>itemLower.includes(k));
  const base=DEMO_PRICES[key];
  if(key&&cur==="INR"&&base?.ranges){
    const r=base.ranges[key];
    if(r){
      const tier=p<r[0]?DEMO_PREBUY.low:p<=r[1]?DEMO_PREBUY.fair:DEMO_PREBUY.high;
      return{...tier,price_range:`₹${r[0]}–${r[1]}`};
    }
  }
  return{...DEMO_PREBUY.fair,price_range:base?.price_range||"Market rate varies"};
};

// ── 3D TILT ───────────────────────────────────────────────────────────────
function TiltCard({children,style}){
  const ref=useRef(null);
  const onMove=useCallback(e=>{
    const el=ref.current;if(!el)return;
    const r=el.getBoundingClientRect();
    const x=e.clientX-r.left,y=e.clientY-r.top;
    const rx=-((y-r.height/2)/r.height)*10,ry=((x-r.width/2)/r.width)*12;
    el.style.transform=`perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.02)`;
  },[]);
  const onLeave=useCallback(()=>{if(ref.current)ref.current.style.transform="perspective(800px) rotateX(0) rotateY(0) scale(1)";},[]);
  return <div ref={ref} className="tilt-card paper" onMouseMove={onMove} onMouseLeave={onLeave} style={{transition:"transform .12s ease",...style}}>
    <div style={{transform:"translateZ(14px)"}}>{children}</div>
  </div>;
}

// ── PARALLAX STACK ────────────────────────────────────────────────────────
function ParallaxStack(){
  const [sy,setSy]=useState(0);
  useEffect(()=>{const h=()=>setSy(window.scrollY);window.addEventListener("scroll",h,{passive:true});return()=>window.removeEventListener("scroll",h);},[]);
  const docs=[
    {r:-8,x:-60,y:0,z:1,label:"#4821",verdict:"RIPPED",item:"Cappuccino · CCD Bandra",amt:"INR 280"},
    {r:5,x:50,y:-20,z:2,label:"#4822",verdict:"LEGIT",item:"Auto ride · Andheri",amt:"INR 65"},
    {r:-2,x:10,y:-40,z:3,label:"#4823",verdict:"FAIR",item:"Biryani · Mohammed Ali Rd",amt:"INR 220"},
    {r:9,x:-30,y:-60,z:4,label:"#4824",verdict:"RIPPED",item:"Hotel · Juhu Beach",amt:"USD 180"},
    {r:-5,x:40,y:-80,z:5,label:"#4825",verdict:"DEAL",item:"Haircut · Kandivali",amt:"INR 150"},
  ];
  const sp=[0.04,0.07,0.1,0.14,0.18];
  return <div style={{position:"relative",height:340,perspective:"1000px"}}>
    {docs.map((d,i)=>{
      const v=VC[d.verdict]||{stamp:"FILED",color:"#555"};
      return <div key={i} style={{
        position:"absolute",top:"50%",left:"50%",width:220,
        transform:`translate(calc(-50% + ${d.x}px),calc(-50% + ${d.y-sy*sp[i]}px)) rotate(${d.r}deg)`,
        zIndex:d.z,transition:"transform .05s linear",
        background:"#faf6ea",
        backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 19px,rgba(43,38,32,.05) 20px)",
        border:"1px solid #d8cda8",
        boxShadow:`${2+i}px ${3+i}px ${6+i*2}px rgba(43,38,32,${.07+i*.02})`,
        padding:"14px 16px",borderRadius:2,
      }}>
        <p className="mono" style={{fontSize:8,color:"#8a7d5c",letterSpacing:"2px",marginBottom:6}}>RECEIPT {d.label}</p>
        <p style={{fontSize:11,color:"#2b2620",fontWeight:700,marginBottom:4}}>{d.item}</p>
        <p className="mono" style={{fontSize:10,color:"#5a5142",marginBottom:10}}>{d.amt}</p>
        <div style={{display:"inline-block",border:`2px solid ${v.color}`,color:v.color,fontSize:9,padding:"2px 8px",letterSpacing:"1.5px",transform:"rotate(-4deg)",fontFamily:"'Special Elite',monospace",opacity:.9}}>{v.stamp}</div>
        <div style={{position:"absolute",bottom:8,right:10,fontSize:8,color:"#c4b896"}} className="mono">REALPRICE™</div>
      </div>;
    })}
  </div>;
}

function Stamp({verdict,big}){
  const v=VC[verdict]||{stamp:"FILED",color:"#555"};
  return <div className="stamp" style={{display:"inline-block",border:`${big?4:3}px solid ${v.color}`,color:v.color,fontFamily:"'Special Elite',monospace",fontSize:big?22:14,padding:big?"8px 20px":"4px 12px",letterSpacing:"2px",transform:"rotate(-6deg)",textTransform:"uppercase",borderRadius:4,opacity:.92,background:"rgba(255,255,255,.4)"}}>{v.stamp}</div>;
}
function Chip({options,value,onChange}){
  return <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
    {options.map(o=><button key={o} onClick={()=>onChange(o)} style={{padding:"6px 12px",fontSize:11,cursor:"pointer",border:value===o?"2px solid #1f1a14":"1.5px solid #c4b896",background:value===o?"#1f1a14":"transparent",color:value===o?"#f4f0e6":"#5a5142",fontWeight:value===o?700:400,fontFamily:"'Courier Prime',monospace",textTransform:"uppercase",letterSpacing:".5px"}}>{o}</button>)}
  </div>;
}

        {tab===1&&<div style={{display:"flex",flexDirection:"column",gap:18}}>
          <div><p className="mono" style={{fontSize:10,fontWeight:700,color:"#8a7d5c",letterSpacing:"1px",marginBottom:6}}>BUSINESS NAME</p><input className="ledger-input" placeholder="e.g. Social, Starbucks, Taj Hotel" value={biz} onChange={e=>setBiz(e.target.value)}/></div>
          <div><p className="mono" style={{fontSize:10,fontWeight:700,color:"#8a7d5c",letterSpacing:"1px",marginBottom:6}}>BUSINESS TYPE</p><Chip options={BIZ_TYPES} value={bType} onChange={setBType}/></div>
          <div><p className="mono" style={{fontSize:10,fontWeight:700,color:"#8a7d5c",letterSpacing:"1px",marginBottom:6}}>CITY</p><input className="ledger-input" placeholder="e.g. Mumbai, London, New York" value={city} onChange={e=>setCity(e.target.value)}/></div>
          <div><p className="mono" style={{fontSize:10,fontWeight:700,color:"#8a7d5c",letterSpacing:"1px",marginBottom:6}}>REVIEW SOURCES</p><Chip options={REVIEW_SRC} value={rSrc} onChange={setRSrc}/></div>
          <button onClick={runVibeCheck} disabled={!vReady} className="btn-stamp" style={{opacity:vReady?1:.4,cursor:vReady?"pointer":"not-allowed",marginTop:6}}>{loading?"Reviewing testimony…":"File for Verdict →"}</button>
          {loading&&<div style={{textAlign:"center",padding:"14px 0"}}><Spinner/><p className="mono" style={{fontSize:11,color:"#8a7d5c",marginTop:10,letterSpacing:"1px"}}>READING REVIEWS ON FILE…</p></div>}
        </div>}

        {tab===2&&(history.length<2
          ?<div style={{textAlign:"center",padding:"3rem 1rem"}}><p style={{fontSize:40,marginBottom:14}}>📒</p><p style={{fontSize:14,color:"#8a7d5c",fontStyle:"italic"}}>File at least 2 cases to unlock your ledger summary.</p></div>
          :(()=>{
            const total=history.length,deals=history.filter(h=>["DEAL","LEGIT"].includes(h.verdict)).length,ripped=history.filter(h=>["RIPPED","OVERHYPED"].includes(h.verdict)).length,fair=total-deals-ripped;
            const dPct=Math.round((deals/total)*100),rPct=Math.round((ripped/total)*100);
            const catMap={};
            history.filter(h=>h.mode==="price"&&h.raw?.category).forEach(h=>{const c=h.raw.category;catMap[c]=catMap[c]||{t:0,r:0};catMap[c].t++;if(h.verdict==="RIPPED")catMap[c].r++;});
            const topC=Object.entries(catMap).sort((a,b)=>b[1].t-a[1].t)[0];
            const topR=Object.entries(catMap).sort((a,b)=>b[1].r-a[1].r)[0];
            const Bar=({l,v,c})=><div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span className="mono" style={{fontSize:11,color:"#5a5142"}}>{l}</span><span className="mono" style={{fontSize:12,fontWeight:700,color:c}}>{v}</span></div>
              <div style={{background:"#d8cda8",height:8}}><div style={{height:"100%",background:c,width:`${Math.round((v/Math.max(total,1))*100)}%`,transition:"width .6s ease"}}/></div>
            </div>;
            return <div>
              <p className="mono" style={{fontSize:10,fontWeight:700,color:"#8a7d5c",letterSpacing:"1px",marginBottom:16}}>▸ CASE SUMMARY ON RECORD</p>
              <div style={{display:"flex",gap:0,marginBottom:20,border:"2px solid #1f1a14"}}>
                {[{v:total,l:"TOTAL FILED"},{v:`${dPct}%`,l:"DEALS"},{v:`${rPct}%`,l:"RIPPED"}].map((s,i)=><div key={i} style={{flex:1,textAlign:"center",padding:"14px 6px",borderRight:i<2?"2px solid #1f1a14":"none"}}>
                  <p style={{fontFamily:"'Special Elite',monospace",fontSize:20,color:"#1f1a14"}}>{s.v}</p>
                  <p className="mono" style={{fontSize:9,color:"#8a7d5c",marginTop:3,letterSpacing:"1px"}}>{s.l}</p>
                </div>)}
              </div>
              <Bar l="DEALS / LEGIT" v={deals} c="#1a5c34"/>
              <Bar l="FAIR" v={fair} c="#8a6200"/>
              <Bar l="RIPPED / OVERHYPED" v={ripped} c="#c4392a"/>
              {topC&&<p style={{fontSize:13,color:"#5a5142",marginTop:16,lineHeight:1.7}}>▸ Most filed: <b style={{color:"#1f1a14"}}>{topC[0]}</b> ({topC[1].t} cases)</p>}
              {topR&&topR[1].r>0&&<p style={{fontSize:13,color:"#5a5142",marginTop:6,lineHeight:1.7}}>▸ Most disputed: <b style={{color:"#c4392a"}}>{topR[0]}</b> ({topR[1].r} ripped)</p>}
            </div>;
          })()
        )}

        {tab===3&&(history.length===0
          ?<div style={{textAlign:"center",padding:"3rem 1rem"}}><p style={{fontSize:40,marginBottom:14}}>🗂️</p><p style={{fontSize:14,color:"#8a7d5c",fontStyle:"italic"}}>No cases filed yet. Try a common filing above.</p></div>
          :<div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
              <p className="mono" style={{fontSize:11,color:"#8a7d5c"}}>{history.length} CASES ON FILE</p>
              <button onClick={()=>{setHistory([]);store.set("rp_h6",[]);}} className="mono" style={{fontSize:11,color:"#c4392a",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>CLEAR LEDGER</button>
            </div>
            {history.map((h,i)=>{
              const v=VC[h.verdict]||{label:h.verdict,color:"#555"};
              return <div key={i} onClick={()=>{if(h.mode==="vibe"){setBiz(h.raw.bizName);setCity(h.raw.bizCity);setTab(1);}else{setItem(h.raw.item);setLoc(h.raw.location);setPbLoc(h.raw.location);setPrice(h.raw.price);setCur(h.raw.currency);setQty(h.raw.qty||"1");setCat(h.raw.category);setTab(0);}setResult(null);setPbResult(null);setRKey(null);}} style={{padding:"12px 4px",borderBottom:"1.5px dashed #c4b896",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",gap:10}}>
                <div style={{flex:1}}><p style={{fontSize:13,color:"#1f1a14",fontWeight:700}}>{h.label}</p><p className="mono" style={{fontSize:10,color:"#8a7d5c",marginTop:2}}>{h.location} · {h.time}</p></div>
                <span className="mono" style={{fontSize:10,fontWeight:700,color:v.color,border:`1.5px solid ${v.color}`,padding:"2px 8px"}}>{v.label}</span>
              </div>;
            })}
          </div>
        )}
      </div>

      {tab===0&&priceMode==="paid"&&!loading&&<ResultReceipt result={result} mode="price" onShare={doShare} copied={copied} tips={tips} onTip={addTip} query={lastQuery}/>}
      {tab===1&&!loading&&<ResultReceipt result={result} mode="vibe" onShare={doShare} copied={copied} tips={tips} onTip={addTip} query={lastQuery}/>}
    </div>
  </section>;
}

function Footer(){
  return <footer style={{background:"#1f1a14",padding:"48px 24px 28px",color:"#a89c7d"}}>
    <div style={{maxWidth:1000,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:30,marginBottom:36}}>
        <div>
          <p style={{fontFamily:"'Special Elite',monospace",fontSize:20,color:"#f4f0e6",marginBottom:8}}>RealPrice™</p>
          <p style={{fontSize:13,lineHeight:1.8,maxWidth:280,fontStyle:"italic"}}>"No fluff. Just the truth about prices and places — filed honestly, anywhere in the world."</p>
        </div>
        <div style={{display:"flex",gap:48,flexWrap:"wrap"}}>
          <div><p className="mono" style={{fontSize:10,color:"#6b5f47",letterSpacing:"1px",marginBottom:12}}>THE DOCKET</p>
            {["Price Check","Vibe Check","Spending Ledger","History"].map(l=><p key={l} style={{fontSize:13,color:"#a89c7d",marginBottom:9,cursor:"pointer"}}>{l}</p>)}
          </div>
          <div><p className="mono" style={{fontSize:10,color:"#6b5f47",letterSpacing:"1px",marginBottom:12}}>RECORDS OFFICE</p>
            {["About","Blog","Contact","Privacy Policy"].map(l=><p key={l} style={{fontSize:13,color:"#a89c7d",marginBottom:9,cursor:"pointer"}}>{l}</p>)}
          </div>
        </div>
      </div>
      <div style={{borderTop:"1px dashed #4a4030",paddingTop:20,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <p className="mono" style={{fontSize:11}}>© 2025 REALPRICE. ALL RECORDS RESERVED.</p>
        <p className="mono" style={{fontSize:11}}>FILED WITH ❤️ IN MUMBAI, INDIA</p>
      </div>
    </div>
  </footer>;
}

function App(){
  const toolRef=useRef(null);
  const scrollToTool=()=>toolRef.current?.scrollIntoView({behavior:"smooth",block:"start"});
  return <div>
    <Navbar onTryNow={scrollToTool}/>
    <Hero onTryNow={scrollToTool}/>
    <Ticker/>
    <HowItWorks/>
    <Features/>
    <div ref={toolRef}><AppTool/></div>
    <Footer/>
  </div>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
